name: Verify

# Phase 2 gates — these exist specifically so a bug class like the bare
# `goto` table key (a Lua syntax error invisible to eslint/grep, only
# ever surfaced when FreeSWITCH itself tries to load the file mid-call)
# or the dropped <context> tag (well-formed XML that FreeSWITCH's parser
# silently discards with zero error) is caught on every push, not
# discovered after 6+ real test calls on a live customer box.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fs_enrs_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      INTERNAL_API_KEY: test-internal-key-32charmin
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: fs_enrs_test
      DB_USER: postgres
      DB_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.2 + libxml2-utils
        # lua5.2 matches FreeSWITCH's embedded Lua version; libxml2-utils
        # provides xmllint. Both are hard requirements for the gates below
        # to actually run — verify-*.js scripts fail loudly (exit 1) if
        # either is missing, rather than silently skipping.
        run: sudo apt-get update && sudo apt-get install -y lua5.2 libxml2-utils

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run migrations against the CI database
        working-directory: backend
        run: npm run migrate

      - name: Lua syntax gate
        working-directory: backend
        run: npm run verify:lua

      - name: XML structural gate
        working-directory: backend
        run: npm run verify:xml

      - name: API contract checker
        run: node scripts/verify-api-contracts.js

      - name: Backend lint
        working-directory: backend
        run: npm run lint

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Backend tests (unit + integration, real Postgres above)
        working-directory: backend
        run: npm test

      - name: Frontend tests
        working-directory: frontend
        run: npm test
