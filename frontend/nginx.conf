server {
    listen 8100;
    root /usr/share/nginx/html;
    index index.html;

    # Increase buffer and timeout for API responses (large payloads, long-poll)
    proxy_read_timeout          90s;
    proxy_connect_timeout       10s;
    proxy_send_timeout          90s;
    proxy_buffering             off;
    proxy_request_buffering     off;

    # Forward real client IP to backend
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # REST API — proxy to backend
    location /api/ {
        proxy_pass http://backend:4100;
    }

    # Socket.IO — long-lived WebSocket connections need extended timeouts
    location /socket.io/ {
        proxy_pass http://backend:4100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout          3600s;
        proxy_send_timeout          3600s;
    }

    # Uploaded files — proxy to backend (auth enforced server-side)
    location /uploads/ {
        proxy_pass http://backend:4100;
    }

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers for HTML responses
        add_header X-Frame-Options       DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy       strict-origin-when-cross-origin;
    }
}
